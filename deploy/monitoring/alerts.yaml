apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name:      smartscaler-alerts
  namespace: kube-system
  labels:
    app:     smartscaler
    release: kube-prometheus-stack
spec:
  groups:
    - name: smartscaler.scale
      rules:
        - alert: SmartScalerAtMaxReplicas
          expr: |
            smartscaler_current_replicas
            >= on(namespace, deployment) group_left()
            (smartscaler_current_replicas * 0 + 1)
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "SmartScaler {{ $labels.deployment }} is at max replicas for 5m"
            description: "Check if max is too low or if there's a real load spike."

        - alert: SmartScalerHighScaleErrors
          expr: rate(smartscaler_scale_errors_total[5m]) > 0.1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "SmartScaler {{ $labels.deployment }} has frequent scale errors"
            description: "More than 0.1 errors/sec in the last 5m. Check logs."

        - alert: SmartScalerHighCost
          expr: smartscaler_estimated_cost_usd_per_hour > 0.50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "SmartScaler {{ $labels.deployment }} cost exceeds $0.50/hr"
            description: "Consider reviewing scale thresholds or max replicas."

        - alert: SmartScalerCooldownStuck
          expr: smartscaler_cooldown_active == 1
          for: 10m
          labels:
            severity: info
          annotations:
            summary: "SmartScaler {{ $labels.scaler }} has been in cooldown for 10m"

        - alert: SmartScalerReconcileSlowP99
          expr: |
            histogram_quantile(0.99,
              rate(smartscaler_reconcile_duration_seconds_bucket[5m])
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "SmartScaler p99 reconcile latency > 2s"
            description: "Possible metrics API slowness or cluster overload."
